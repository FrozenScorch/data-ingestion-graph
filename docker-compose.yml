version: '3.8'

services:
  # PostgreSQL with pgvector extension
  ingestion-postgres:
    image: pgvector/pgvector:pg16
    container_name: ingestion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ingestion
      POSTGRES_PASSWORD: ingestion_password
      POSTGRES_DB: ingestion_db
      POSTGRES_ENCODING: UTF8
      PGPORT: ${POSTGRES_PORT:-5432}
    volumes:
      - ingestion_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingestion -d ingestion_db -p ${POSTGRES_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    network_mode: host

  # Redis cache and message broker
  ingestion-redis:
    image: redis:7-alpine
    container_name: ingestion-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret_change_me} --port ${REDIS_PORT:-6379}
    volumes:
      - ingestion_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_change_me}", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    network_mode: host

  # FastAPI Backend
  ingestion-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ingestion-api
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://ingestion:ingestion_password@localhost:${POSTGRES_PORT:-5432}/ingestion_db
      DATABASE_POOL_SIZE: 10
      DATABASE_MAX_OVERFLOW: 20
      DATABASE_ECHO: "false"

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_change_me}@localhost:${REDIS_PORT:-6379}/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_change_me}

      # Auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-in-production}
      CONNECTION_ENCRYPTION_KEY: ${CONNECTION_ENCRYPTION_KEY:?required}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60

      # Admin seed
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ingestion-graph.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      # OpenRouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # App
      APP_NAME: enterprise-data-ingestion-graph-studio
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_PORT: 8040

      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:8040

      # File storage
      UPLOAD_DIR: /app/data/uploads
      TEMP_DIR: /app/data/temp

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Encoding
      PYTHONIOENCODING: utf-8
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/temp:/app/data/temp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r = httpx.get('http://localhost:8040/health'); r.raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    network_mode: host
    depends_on:
      ingestion-postgres:
        condition: service_healthy
      ingestion-redis:
        condition: service_healthy

  # Frontend (SvelteKit - adapter-node)
  ingestion-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ingestion-frontend
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      ORIGIN: http://localhost:3000
      API_HOST: http://localhost:8040
    network_mode: host
    profiles:
      - frontend

volumes:
  ingestion_postgres_data:
    driver: local
  ingestion_redis_data:
    driver: local
