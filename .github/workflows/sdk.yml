name: Studio and SDK CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/init_lan_env.py --host localhost
      - run: docker compose config --format json > compose.json
      - run: python scripts/verify_compose.py compose.json
      - run: >-
          docker run --rm
          -e STUDIO_HOSTNAME=localhost
          -e STUDIO_ORIGIN=http://localhost:8040
          -e STUDIO_HTTPS_PORT=8443
          -v "$PWD/deploy/caddy:/etc/caddy:ro"
          caddy:2.11.4-alpine
          caddy validate --config /etc/caddy/Caddyfile.http --adapter caddyfile
      - run: >-
          docker run --rm
          -e STUDIO_HOSTNAME=localhost
          -e STUDIO_ORIGIN=https://localhost:8443
          -e STUDIO_HTTPS_PORT=8443
          -v "$PWD/deploy/caddy:/etc/caddy:ro"
          caddy:2.11.4-alpine
          caddy validate --config /etc/caddy/Caddyfile.tls --adapter caddyfile

  sdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./sdk[dev]"
      - run: python -m ruff check sdk/src sdk/tests
      - run: python -m ruff format --check sdk/src sdk/tests
      - run: python -m mypy
        working-directory: sdk
      - run: python -m pytest tests -q
        working-directory: sdk
      - run: python -m build --outdir ../dist
        working-directory: sdk
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import ingestion_graph; print(ingestion_graph.__version__)"
      - name: Verify installed wheel connector manifests
        run: >-
          python -c "from ingestion_graph import load_connector_manifest;
          from ingestion_graph.plugins import discover_plugins;
          assert set(discover_plugins('sources')) == {'discord', 'jsonl', 'local_documents', 'postgres', 'rest'};
          assert set(discover_plugins('destinations')) == {'jsonl', 'postgres', 'sqlite'};
          assert load_connector_manifest('sources', 'postgres').name == 'postgres';
          assert load_connector_manifest('sources', 'rest').name == 'rest';
          assert load_connector_manifest('destinations', 'jsonl').name == 'jsonl';
          assert load_connector_manifest('destinations', 'postgres').name == 'postgres';
          assert load_connector_manifest('destinations', 'sqlite').name == 'sqlite'"
      - run: python -m mypy --strict typecheck/consumer.py
        working-directory: sdk

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ingestion
          POSTGRES_PASSWORD: ingestion
          POSTGRES_DB: ingestion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ingestion -d ingestion_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://ingestion:ingestion@localhost:5432/ingestion_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python -c "import ingestion_graph; print(ingestion_graph.__version__)"
      - run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check
      - run: npm run build
