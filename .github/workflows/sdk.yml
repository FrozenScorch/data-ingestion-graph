name: Studio and SDK CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sdk:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: sdk/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./sdk[dev]"
      - run: python -m ruff check sdk/src sdk/tests
      - run: python -m ruff format --check sdk/src sdk/tests
      - run: python -m mypy
        working-directory: sdk
      - run: python -m pytest tests -q
        working-directory: sdk
      - run: python -m build --outdir ../dist
        working-directory: sdk
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import ingestion_graph; print(ingestion_graph.__version__)"
      - run: python -m mypy --strict typecheck/consumer.py
        working-directory: sdk

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r backend/requirements.txt
      - run: python -c "import ingestion_graph; print(ingestion_graph.__version__)"
      - run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check
      - run: npm run build
